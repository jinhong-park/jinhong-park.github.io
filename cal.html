        // === 1. 실시간 시계 함수 (이전과 동일) ===
        function updateClock() {
            const now = new Date();
            
            // 날짜 표시
            const dateOptions = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            const dateString = now.toLocaleDateString('ko-KR', dateOptions);
            document.getElementById('date').textContent = dateString;

            // 실시간 시간 표시
            const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: true };
            const timeString = now.toLocaleTimeString('en', timeOptions);
            document.getElementById('time').textContent = timeString;
        }

        // === 2. 달력 생성 함수 ===
        function renderCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth(); // 0부터 시작 (0=1월, 11=12월)
            const todayDate = now.getDate(); // 오늘 날짜

            // 현재 월의 첫 번째 날 (요일을 알기 위함)
            const firstDayOfMonth = new Date(year, month, 1).getDay(); // 0(일요일) ~ 6(토요일)
            // 다음 월의 첫 번째 날 (현재 월의 마지막 날을 알기 위함)
            const lastDayOfMonth = new Date(year, month + 1, 0).getDate(); 

            // 달력 컨테이너 요소
            const calendarContainer = document.getElementById('calendar-container');
            calendarContainer.innerHTML = ''; // 기존 내용 초기화

            // 달력 헤더 (연도와 월)
            const header = document.createElement('div');
            header.className = 'calendar-header';
            header.textContent = `${year}년 ${month + 1}월`;
            calendarContainer.appendChild(header);

            // 요일 헤더 (일월화수목금토)
            const weekDays = ['일', '월', '화', '수', '목', '금', '토'];
            const gridHeader = document.createElement('div');
            gridHeader.className = 'calendar-grid';
            weekDays.forEach((day, index) => {
                const dayHeader = document.createElement('div');
                dayHeader.className = 'day-header';
                if (index === 0) dayHeader.classList.add('sun');
                if (index === 6) dayHeader.classList.add('sat');
                dayHeader.textContent = day;
                gridHeader.appendChild(dayHeader);
            });
            calendarContainer.appendChild(gridHeader);

            // 날짜 그리드
            const gridBody = document.createElement('div');
            gridBody.className = 'calendar-grid';

            // 1. 첫 번째 날 이전의 빈 칸 채우기
            for (let i = 0; i < firstDayOfMonth; i++) {
                gridBody.appendChild(document.createElement('div'));
            }

            // 2. 해당 월의 날짜 채우기
            for (let date = 1; date <= lastDayOfMonth; date++) {
                const day = document.createElement('div');
                day.className = 'day';
                day.textContent = date;
                
                // 오늘 날짜 강조
                if (date === todayDate) {
                    day.classList.add('today');
                }

                // 요일에 따른 색상 추가
                const dayOfWeek = new Date(year, month, date).getDay(); // 0=일, 6=토
                if (dayOfWeek === 0) day.classList.add('sun');
                if (dayOfWeek === 6) day.classList.add('sat');

                gridBody.appendChild(day);
            }
            
            calendarContainer.appendChild(gridBody);
        }

		// === 4. 일기 Markdown 변환 함수 (본문만 Hard Wrap 적용) ===
		function generateJournalMarkdown() {
		    const inputElement = document.getElementById('journal-input');
		    const outputElement = document.getElementById('journal-markdown-output');
		    const journalText = inputElement.value.trim();

		    if (!journalText) {
		        outputElement.textContent = "입력된 일기 내용이 없습니다.";
		        return;
		    }

		    /**
		     * Hard Wrap 로직: 본문에만 적용될 함수
		     */
		    function hardWrapText(text, limit = 80) {
		        return text.split('\n').map(line => {
		            if (line.length <= limit) return line;
		            const pattern = new RegExp(`.{1,${limit}}(\\s|$)|.{1,${limit}}`, 'g');
		            const matches = line.match(pattern);
		            return matches ? matches.map(part => part.trimEnd()).join('\n') : line;
		        }).join('\n');
		    }

		    // 1. 본문에만 Hard Wrap 적용
		    const wrappedBodyText = hardWrapText(journalText, 80);

		    // 2. 날짜 생성 로직
		    const now = new Date();
		    const offset = now.getTimezoneOffset() * 60000;
		    const localDate = new Date(now.getTime() - offset);
		    const dateTitle = localDate.toISOString().split('T')[0];
		    const fullDate = localDate.toISOString().replace('T', ' ').substring(0, 19);

		    // 3. YAML Front Matter 블록 (Hard Wrap 적용 안 함)
		    // 이 부분은 변수들이 길어져도 한 줄로 유지됩니다.
		    const frontMatter = [
		        '---',
		        'layout: post',
		        `title: ${dateTitle} Journal`,
		        `date: ${fullDate}`,
		        'categories: journal',
		        'excerpt: ---'
		    ].join('\n');

		    // 4. 최종 결합: 원본 Front Matter + 줄바꿈된 본문
		    const finalMarkdown = `${frontMatter}\n\n## ${dateTitle} Journal\n\n${wrappedBodyText}`;

		    outputElement.textContent = finalMarkdown;
		}

           const progressCircle = document.getElementById('progress');
        const timeText = document.getElementById('time-text');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const clock = document.getElementById('clock');

        const radius = 140;
        const circumference = 2 * Math.PI * radius;
        let totalSeconds = 0;
        let timerInterval = null;
        let isDragging = false;

        // 초기화
        progressCircle.style.strokeDasharray = circumference;
        updateDisplay(0);

        // 마우스 이벤트: 시간 설정
        clock.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', handleSetTime);

        function handleSetTime(e) {
            if (!isDragging || timerInterval) return;

            const rect = clock.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            // 각도 계산 (라디안 -> 도)
            let angle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * 180 / Math.PI;
            angle = (angle + 90 + 360) % 360; // -90도 보정 및 양수화

            // 각도를 분으로 변환 (360도 = 60분)
            const minutes = Math.round((angle / 360) * 60);
            totalSeconds = minutes * 60;
            updateDisplay(totalSeconds);
        }

        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timeText.innerText = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            
            // 시계 바늘 업데이트 (게이지)
            const offset = circumference - (seconds / 3600) * circumference;
            progressCircle.style.strokeDashoffset = isNaN(offset) ? circumference : offset;
        }

        // 타이머 시작
        startBtn.addEventListener('click', () => {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                startBtn.innerText = '재개';
            } else {
                if (totalSeconds <= 0) return alert("시간을 설정해주세요!");
                
                startBtn.innerText = '일시정지';
                timerInterval = setInterval(() => {
                    totalSeconds--;
                    updateDisplay(totalSeconds);

                    if (totalSeconds <= 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        alert("시간이 종료되었습니다!");
                        startBtn.innerText = '시작';
                    }
                }, 1000);
            }
        });

        // 초기화 버튼
        resetBtn.addEventListener('click', () => {
            clearInterval(timerInterval);
            timerInterval = null;
            totalSeconds = 0;
            updateDisplay(0);
            startBtn.innerText = '시작';
        });

clock.addEventListener('mousedown', () => isDragging = true);

// --- 터치 이벤트 추가 ---
clock.addEventListener('touchstart', (e) => {
    isDragging = true;
    // 터치 시 화면 스크롤 방지
    e.preventDefault(); 
}, { passive: false });

window.addEventListener('touchend', () => isDragging = false);

window.addEventListener('touchmove', (e) => {
    if (isDragging) {
        // 터치 지점 좌표 전달
        handleSetTime(e.touches[0]);
        // 드래그 중 화면 스크롤 방지
        e.preventDefault();
